<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Formulário de Porcentagem e Juros</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: linear-gradient(135deg, #f4f7fb, #e8eef8);
      color: #1f2937;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding: 30px 15px;
    }

    .container {
      width: 100%;
      max-width: 900px;
      background: #ffffff;
      border-radius: 18px;
      box-shadow: 0 12px 35px rgba(0, 0, 0, 0.12);
      padding: 28px;
    }

    h1 {
      margin: 0 0 10px 0;
      text-align: center;
      color: #1d4ed8;
      font-size: 28px;
    }

    .subtitle {
      text-align: center;
      color: #4b5563;
      margin-bottom: 25px;
      font-size: 15px;
    }

    .top-bar {
      display: flex;
      justify-content: space-between;
      gap: 15px;
      flex-wrap: wrap;
      margin-bottom: 20px;
      padding: 15px;
      background: #f3f6fb;
      border-radius: 12px;
      border: 1px solid #d9e2f2;
    }

    .info-box {
      font-size: 15px;
      color: #374151;
      font-weight: bold;
    }

    .progress-wrapper {
      width: 100%;
      height: 10px;
      background: #e5e7eb;
      border-radius: 999px;
      overflow: hidden;
      margin-bottom: 25px;
    }

    .progress-bar {
      height: 100%;
      width: 0%;
      background: #2563eb;
      transition: width 0.3s ease;
    }

    .question-card {
      border: 1px solid #dbe4f0;
      border-radius: 15px;
      padding: 24px;
      background: #ffffff;
    }

    .question-number {
      font-weight: bold;
      color: #dc2626;
      font-size: 18px;
      margin-bottom: 8px;
    }

    .question-text {
      font-size: 19px;
      line-height: 1.55;
      color: #1e3a8a;
      font-weight: 600;
      margin-bottom: 20px;
    }

    .options {
      display: grid;
      gap: 12px;
      margin-bottom: 20px;
    }

    .option {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 13px 15px;
      border: 1px solid #d1d5db;
      border-radius: 12px;
      cursor: pointer;
      transition: all 0.2s ease;
      background: #fafafa;
      font-size: 16px;
    }

    .option:hover {
      background: #eff6ff;
      border-color: #3b82f6;
    }

    .option input {
      transform: scale(1.15);
      cursor: pointer;
    }

    .option.correct {
      border-color: #16a34a;
      background: #dcfce7;
      color: #14532d;
      font-weight: bold;
    }

    .option.wrong {
      border-color: #dc2626;
      background: #fee2e2;
      color: #7f1d1d;
      font-weight: bold;
    }

    .buttons {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      margin-top: 15px;
    }

    button {
      border: none;
      border-radius: 10px;
      padding: 12px 18px;
      font-size: 15px;
      font-weight: bold;
      cursor: pointer;
      transition: transform 0.15s ease, opacity 0.15s ease;
    }

    button:hover {
      transform: translateY(-1px);
    }

    button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none;
    }

    .btn-primary {
      background: #2563eb;
      color: white;
    }

    .btn-secondary {
      background: #374151;
      color: white;
    }

    .btn-danger {
      background: #dc2626;
      color: white;
    }

    .feedback {
      margin-top: 18px;
      padding: 16px;
      border-radius: 12px;
      display: none;
      line-height: 1.5;
      font-size: 16px;
    }

    .feedback.show {
      display: block;
    }

    .feedback.correct {
      background: #dcfce7;
      color: #14532d;
      border: 1px solid #16a34a;
    }

    .feedback.wrong {
      background: #fee2e2;
      color: #7f1d1d;
      border: 1px solid #dc2626;
    }

    .explanation {
      margin-top: 10px;
      font-weight: normal;
    }

    .result-screen {
      display: none;
      text-align: center;
      padding: 30px 10px;
    }

    .result-screen.show {
      display: block;
    }

    .result-title {
      color: #1d4ed8;
      font-size: 30px;
      margin-bottom: 10px;
    }

    .result-score {
      font-size: 22px;
      font-weight: bold;
      margin: 15px 0;
    }

    .result-message {
      font-size: 17px;
      color: #374151;
      margin-bottom: 20px;
    }

    .hidden {
      display: none;
    }

    .review {
      margin-top: 25px;
      text-align: left;
    }

    .review-item {
      border: 1px solid #d1d5db;
      border-radius: 12px;
      padding: 15px;
      margin-bottom: 12px;
      background: #f9fafb;
    }

    .review-item strong {
      color: #1e3a8a;
    }

    @media (max-width: 600px) {
      .container {
        padding: 20px;
      }

      .question-text {
        font-size: 17px;
      }

      h1 {
        font-size: 24px;
      }

      .buttons {
        flex-direction: column;
      }

      button {
        width: 100%;
      }
    }
  </style>
</head>

<body>
  <div class="container">
    <h1>Formulário de Porcentagem, Juros e Variações</h1>
    <p class="subtitle">Questões em estilo vestibular, com correção automática, som, explicação e pontuação.</p>

    <div id="quizArea">
      <div class="top-bar">
        <div class="info-box" id="questionCounter">Questão 1 de 25</div>
        <div class="info-box" id="scoreCounter">Acertos: 0 | Erros: 0</div>
      </div>

      <div class="progress-wrapper">
        <div class="progress-bar" id="progressBar"></div>
      </div>

      <div class="question-card">
        <div class="question-number" id="questionNumber"></div>
        <div class="question-text" id="questionText"></div>

        <div class="options" id="optionsContainer"></div>

        <div class="buttons">
          <button class="btn-primary" id="checkButton" onclick="checkAnswer()">Responder</button>
          <button class="btn-secondary" id="nextButton" onclick="nextQuestion()" disabled>Próxima</button>
          <button class="btn-danger" onclick="restartQuiz()">Reiniciar</button>
        </div>

        <div class="feedback" id="feedbackBox"></div>
      </div>
    </div>

    <div class="result-screen" id="resultScreen">
      <div class="result-title">Resultado final</div>
      <div class="result-score" id="finalScore"></div>
      <div class="result-message" id="finalMessage"></div>
      <button class="btn-primary" onclick="restartQuiz()">Refazer formulário</button>

      <div class="review" id="reviewArea"></div>
    </div>
  </div>

  <script>
    const questions = [
      {
        id: 1,
        question: "Um produto sofreu aumento de 40% e, em seguida, desconto de 25% sobre o novo preço. Após essas duas alterações, passou a custar R$ 630,00. O preço original era:",
        options: [
          "a) R$ 560,00",
          "b) R$ 600,00",
          "c) R$ 620,00",
          "d) R$ 650,00",
          "e) R$ 700,00"
        ],
        answer: "b",
        explanation: "O preço foi multiplicado por 1,40 e depois por 0,75. Assim, o fator final foi 1,05. Logo, 630 ÷ 1,05 = 600."
      },
      {
        id: 2,
        question: "Um comerciante aumentou o preço de um produto em p%. Em razão disso, a quantidade vendida diminuiu também p%. Sabendo que a receita total caiu 4%, o valor de p é:",
        options: [
          "a) 10%",
          "b) 15%",
          "c) 20%",
          "d) 25%",
          "e) 30%"
        ],
        answer: "c",
        explanation: "A receita fica multiplicada por (1 + p)(1 - p) = 1 - p². Como caiu 4%, temos 1 - p² = 0,96. Logo, p² = 0,04 e p = 20%."
      },
      {
        id: 3,
        question: "Um recipiente contém 80 litros de uma solução com 30% de sal. Parte da água evapora, sem perda de sal, e a concentração passa a ser de 40%. Quantos litros de água evaporaram?",
        options: [
          "a) 15",
          "b) 20",
          "c) 24",
          "d) 28",
          "e) 30"
        ],
        answer: "b",
        explanation: "Havia 24 litros de sal. Para que 24 litros representem 40% da mistura, o volume total deve ser 60 litros. Logo, evaporaram 20 litros."
      },
      {
        id: 4,
        question: "Um capital foi aplicado por um ano à taxa anual de x% e, no ano seguinte, à taxa anual de (x + 10)%, em regime de juros compostos. Ao final dos dois anos, o capital aumentou 32%. O valor de x é:",
        options: [
          "a) 10%",
          "b) 12%",
          "c) 15%",
          "d) 18%",
          "e) 20%"
        ],
        answer: "a",
        explanation: "Temos (1 + x)(1 + x + 0,10) = 1,32. Testando x = 0,10: 1,10 × 1,20 = 1,32. Logo, x = 10%."
      },
      {
        id: 5,
        question: "Dois produtos A e B custavam, juntos, certo valor. O produto A sofreu desconto de 30%, enquanto o produto B sofreu aumento de 20%. Após essas alterações, o preço total dos dois produtos permaneceu igual. Antes das alterações, o produto B era:",
        options: [
          "a) 20% mais caro que A",
          "b) 30% mais caro que A",
          "c) 40% mais caro que A",
          "d) 50% mais caro que A",
          "e) 60% mais caro que A"
        ],
        answer: "d",
        explanation: "Se A e B são os preços originais, então 0,70A + 1,20B = A + B. Logo, 0,20B = 0,30A, então B = 1,5A."
      },
      {
        id: 6,
        question: "Em uma cidade, a população urbana correspondia a 60% da população total. Em certo período, a população total cresceu 25%, enquanto a população urbana cresceu 10%. A população não urbana cresceu:",
        options: [
          "a) 25%",
          "b) 32,5%",
          "c) 40%",
          "d) 45%",
          "e) 47,5%"
        ],
        answer: "e",
        explanation: "Tomando população inicial 100, a urbana era 60 e a não urbana 40. Depois, o total virou 125 e a urbana virou 66. A não urbana passou a ser 59. O crescimento foi de 19 sobre 40, isto é, 47,5%."
      },
      {
        id: 7,
        question: "Um produto recebeu dois descontos sucessivos. O primeiro foi de 20%. Sabendo que os dois descontos equivalem a um único desconto de 32%, o segundo desconto foi de:",
        options: [
          "a) 10%",
          "b) 12%",
          "c) 15%",
          "d) 18%",
          "e) 20%"
        ],
        answer: "c",
        explanation: "Após desconto total de 32%, o produto fica com 68% do preço. Assim, 0,80 × (1 - x) = 0,68. Logo, 1 - x = 0,85 e x = 15%."
      },
      {
        id: 8,
        question: "Um lojista marcou o preço de uma mercadoria 40% acima do custo. Ao vender, concedeu desconto de 10% sobre o preço marcado e ainda assim obteve lucro de R$ 78,00. O preço marcado da mercadoria era:",
        options: [
          "a) R$ 360,00",
          "b) R$ 390,00",
          "c) R$ 420,00",
          "d) R$ 450,00",
          "e) R$ 480,00"
        ],
        answer: "c",
        explanation: "Se o custo é C, o preço marcado é 1,40C. Com desconto de 10%, a venda ocorre por 1,26C. O lucro é 0,26C = 78. Logo, C = 300 e o preço marcado é 420."
      },
      {
        id: 9,
        question: "O comprimento de um retângulo diminuiu x%, enquanto sua largura aumentou x%. Após essas alterações, a área diminuiu 9%. O valor de x é:",
        options: [
          "a) 10%",
          "b) 20%",
          "c) 30%",
          "d) 40%",
          "e) 45%"
        ],
        answer: "c",
        explanation: "A área fica multiplicada por (1 - x)(1 + x) = 1 - x². Como houve redução de 9%, temos 1 - x² = 0,91. Logo, x² = 0,09 e x = 30%."
      },
      {
        id: 10,
        question: "Os bilhetes de uma rifa eram vendidos a R$ 20,00 cada, ou em promoção de 5 bilhetes por R$ 80,00. Sabendo que todos os 600 bilhetes foram vendidos e que a arrecadação total foi de R$ 10.200,00, o número de bilhetes vendidos na promoção foi:",
        options: [
          "a) 300",
          "b) 350",
          "c) 400",
          "d) 425",
          "e) 450"
        ],
        answer: "e",
        explanation: "Sem promoção, a arrecadação seria 600 × 20 = 12.000. Cada grupo promocional de 5 bilhetes reduz a arrecadação em R$ 20,00. A diferença foi 1.800. Logo, foram 90 grupos promocionais, isto é, 450 bilhetes."
      },
      {
        id: 11,
        question: "Um capital aplicado a juros compostos dobra de valor em 3 anos. A taxa anual aproximada dessa aplicação é:",
        options: [
          "a) 20%",
          "b) 22%",
          "c) 24%",
          "d) 26%",
          "e) 30%"
        ],
        answer: "d",
        explanation: "Temos (1 + i)³ = 2. Logo, 1 + i = raiz cúbica de 2, aproximadamente 1,26. Assim, i é aproximadamente 26% ao ano."
      },
      {
        id: 12,
        question: "Uma liga metálica de 10 kg contém 12% de cobre. Quantos kg de cobre puro devem ser adicionados para que a nova liga contenha 20% de cobre?",
        options: [
          "a) 0,5 kg",
          "b) 1 kg",
          "c) 1,5 kg",
          "d) 2 kg",
          "e) 2,5 kg"
        ],
        answer: "b",
        explanation: "A liga inicial contém 1,2 kg de cobre. Adicionando x kg de cobre puro, temos (1,2 + x)/(10 + x) = 0,20. Resolvendo, x = 1."
      },
      {
        id: 13,
        question: "Em um colégio, 40% dos alunos estudavam pela manhã e 60% à tarde. Depois, 15% dos alunos da manhã passaram para o turno da tarde. Após a mudança, o número de alunos da tarde passou a ser, aproximadamente, quantos por cento maior que o da manhã?",
        options: [
          "a) 76%",
          "b) 82%",
          "c) 88%",
          "d) 94%",
          "e) 100%"
        ],
        answer: "d",
        explanation: "Tomando 100 alunos, havia 40 pela manhã e 60 à tarde. 15% de 40 é 6. Depois, ficaram 34 pela manhã e 66 à tarde. A diferença é 32, que representa 32/34, aproximadamente 94%."
      },
      {
        id: 14,
        question: "Um produto sofreu dois descontos sucessivos: o primeiro de x% e o segundo de 2x%. Sabendo que o desconto total foi de 28%, o valor de x é:",
        options: [
          "a) 8%",
          "b) 10%",
          "c) 12%",
          "d) 14%",
          "e) 15%"
        ],
        answer: "b",
        explanation: "Temos (1 - x)(1 - 2x) = 0,72. Assim, 1 - 3x + 2x² = 0,72. Resolvendo, x = 0,10, ou seja, 10%."
      },
      {
        id: 15,
        question: "Um capital de R$ 2.000,00 aplicado a juros compostos de 10% ao ano, por 2 anos, gera o mesmo montante que outro capital de R$ 2.000,00 aplicado a juros simples, por 2 anos, a uma taxa anual de:",
        options: [
          "a) 10%",
          "b) 10,5%",
          "c) 11%",
          "d) 11,5%",
          "e) 12%"
        ],
        answer: "b",
        explanation: "A juros compostos, o montante é 2000 × 1,1² = 2420. A juros simples: 2000 × (1 + 2i) = 2420. Logo, 1 + 2i = 1,21, então i = 10,5%."
      },
      {
        id: 16,
        question: "Um tanque contém 600 litros de combustível com 8% de álcool. Retira-se certa quantidade dessa mistura e repõe-se o mesmo volume com gasolina pura. Após isso, a mistura passa a ter 6% de álcool. Quantos litros foram retirados?",
        options: [
          "a) 100",
          "b) 120",
          "c) 140",
          "d) 150",
          "e) 180"
        ],
        answer: "d",
        explanation: "Havia 48 litros de álcool. Após retirar x litros da mistura, restam 48 × (600 - x)/600 litros de álcool. Isso deve ser igual a 6% de 600, isto é, 36. Logo, x = 150."
      },
      {
        id: 17,
        question: "Em uma cidade, 24% dos habitantes não tinham acesso à internet. Após um programa público, 25% dessas pessoas passaram a ter acesso. Se ainda restaram 18.000 habitantes sem internet, a população da cidade é:",
        options: [
          "a) 75.000",
          "b) 80.000",
          "c) 90.000",
          "d) 96.000",
          "e) 100.000"
        ],
        answer: "e",
        explanation: "Os 18.000 correspondem a 75% dos que não tinham internet antes. Logo, antes havia 24.000 sem internet. Como isso representa 24% da população, o total é 100.000."
      },
      {
        id: 18,
        question: "Uma revista custa R$ 15,00. Em uma promoção, o cliente paga 10 revistas, recebe 12 e ainda ganha 5% de desconto sobre o valor pago. O desconto efetivo por unidade, em relação ao preço normal de 12 revistas, é de aproximadamente:",
        options: [
          "a) 15,0%",
          "b) 16,7%",
          "c) 18,5%",
          "d) 20,8%",
          "e) 25,0%"
        ],
        answer: "d",
        explanation: "Doze revistas custariam R$ 180,00. Pela promoção, paga-se 10 × 15 = 150, com 5% de desconto, ou seja, R$ 142,50. O desconto é 37,50 sobre 180, aproximadamente 20,8%."
      },
      {
        id: 19,
        question: "O lado de um quadrado foi aumentado em x%. Com isso, sua área aumentou 69%. O valor de x é:",
        options: [
          "a) 20%",
          "b) 25%",
          "c) 30%",
          "d) 35%",
          "e) 40%"
        ],
        answer: "c",
        explanation: "Se o lado é multiplicado por 1 + x, a área é multiplicada por (1 + x)². Como a área aumentou 69%, temos (1 + x)² = 1,69. Logo, 1 + x = 1,30 e x = 30%."
      },
      {
        id: 20,
        question: "O preço de A é 25% menor que o preço de B. Então, o preço de B é, em relação ao preço de A:",
        options: [
          "a) 20% maior",
          "b) 25% maior",
          "c) 33,33% maior",
          "d) 40% maior",
          "e) 50% maior"
        ],
        answer: "c",
        explanation: "Se A é 25% menor que B, então A = 0,75B. Logo, B = A/0,75 = 1,333A. Portanto, B é 33,33% maior que A."
      },
      {
        id: 21,
        question: "Um produto teve dois aumentos sucessivos, de 20% e 25%. Para que o preço volte exatamente ao valor original, deve ser aplicado um desconto de:",
        options: [
          "a) 25%",
          "b) 30%",
          "c) 33,33%",
          "d) 37,5%",
          "e) 40%"
        ],
        answer: "c",
        explanation: "Os aumentos sucessivos geram fator 1,20 × 1,25 = 1,50. Para voltar ao preço original, é preciso multiplicar por 2/3. Logo, o desconto é de 1/3, isto é, 33,33%."
      },
      {
        id: 22,
        question: "Dois produtos foram vendidos por R$ 600,00 cada. Em um deles, houve lucro de 20% sobre o custo. No outro, houve prejuízo de 20% sobre o custo. Considerando as duas vendas juntas, houve:",
        options: [
          "a) lucro de 4%",
          "b) prejuízo de 4%",
          "c) lucro de 5%",
          "d) prejuízo de 5%",
          "e) nem lucro nem prejuízo"
        ],
        answer: "b",
        explanation: "No produto com lucro de 20%, o custo era 600/1,2 = 500. No produto com prejuízo de 20%, o custo era 600/0,8 = 750. O custo total foi 1250 e a venda total foi 1200. Houve prejuízo de 50 sobre 1250, isto é, 4%."
      },
      {
        id: 23,
        question: "Em uma eleição, 20% dos votos foram brancos ou nulos. Dos votos válidos, um candidato recebeu 52%, totalizando 8.320 votos. O número total de eleitores que votaram foi:",
        options: [
          "a) 16.000",
          "b) 18.000",
          "c) 19.200",
          "d) 20.000",
          "e) 22.000"
        ],
        answer: "d",
        explanation: "Os votos válidos representam 80% do total. O candidato recebeu 52% dos válidos, ou seja, 0,52 × 0,80 = 0,416 do total. Assim, 8.320 corresponde a 41,6% do total. Logo, o total é 20.000."
      },
      {
        id: 24,
        question: "Uma grandeza foi reduzida em p% e, depois, aumentada em p%. Ao final, ficou igual a 84% do valor inicial. O valor de p é:",
        options: [
          "a) 20%",
          "b) 25%",
          "c) 30%",
          "d) 40%",
          "e) 45%"
        ],
        answer: "d",
        explanation: "O fator final é (1 - p)(1 + p) = 1 - p². Como ficou em 84%, temos 1 - p² = 0,84. Logo, p² = 0,16 e p = 40%."
      },
      {
        id: 25,
        question: "Um comerciante comprou certa quantidade de mercadorias por R$ 8.000,00. Vendeu 60% delas com lucro de 25% e o restante com prejuízo de 10%. O lucro percentual total foi de:",
        options: [
          "a) 9%",
          "b) 10%",
          "c) 11%",
          "d) 12%",
          "e) 15%"
        ],
        answer: "c",
        explanation: "60% do custo corresponde a R$ 4.800, vendidos com lucro de 25%, gerando R$ 6.000. Os 40% restantes custaram R$ 3.200 e foram vendidos com prejuízo de 10%, gerando R$ 2.880. A venda total foi R$ 8.880. O lucro foi R$ 880 sobre R$ 8.000, isto é, 11%."
      }
    ];

    let currentQuestionIndex = 0;
    let correctAnswers = 0;
    let wrongAnswers = 0;
    let answered = false;
    let userAnswers = [];

    function tocarSom(correta) {
      const AudioContext = window.AudioContext || window.webkitAudioContext;
      const audioCtx = new AudioContext();

      const oscillator = audioCtx.createOscillator();
      const gainNode = audioCtx.createGain();

      oscillator.connect(gainNode);
      gainNode.connect(audioCtx.destination);

      if (correta) {
        oscillator.type = "sine";
        oscillator.frequency.setValueAtTime(880, audioCtx.currentTime);
        oscillator.frequency.setValueAtTime(1175, audioCtx.currentTime + 0.08);
      } else {
        oscillator.type = "sawtooth";
        oscillator.frequency.setValueAtTime(260, audioCtx.currentTime);
        oscillator.frequency.setValueAtTime(180, audioCtx.currentTime + 0.1);
      }

      gainNode.gain.setValueAtTime(0.09, audioCtx.currentTime);
      gainNode.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.22);

      oscillator.start(audioCtx.currentTime);
      oscillator.stop(audioCtx.currentTime + 0.22);
    }

    function loadQuestion() {
      answered = false;

      const question = questions[currentQuestionIndex];

      document.getElementById("questionCounter").textContent =
        `Questão ${currentQuestionIndex + 1} de ${questions.length}`;

      document.getElementById("scoreCounter").textContent =
        `Acertos: ${correctAnswers} | Erros: ${wrongAnswers}`;

      document.getElementById("progressBar").style.width =
        `${(currentQuestionIndex / questions.length) * 100}%`;

      document.getElementById("questionNumber").textContent =
        `${String(currentQuestionIndex + 1).padStart(2, "0")}.`;

      document.getElementById("questionText").textContent = question.question;

      const optionsContainer = document.getElementById("optionsContainer");
      optionsContainer.innerHTML = "";

      question.options.forEach(option => {
        const letter = option.charAt(0);

        const label = document.createElement("label");
        label.className = "option";
        label.dataset.letter = letter;

        label.innerHTML = `
          <input type="radio" name="answer" value="${letter}">
          <span>${option}</span>
        `;

        optionsContainer.appendChild(label);
      });

      document.getElementById("feedbackBox").className = "feedback";
      document.getElementById("feedbackBox").innerHTML = "";

      document.getElementById("checkButton").disabled = false;
      document.getElementById("nextButton").disabled = true;

      if (currentQuestionIndex === questions.length - 1) {
        document.getElementById("nextButton").textContent = "Finalizar";
      } else {
        document.getElementById("nextButton").textContent = "Próxima";
      }
    }

    function checkAnswer() {
      if (answered) return;

      const selected = document.querySelector('input[name="answer"]:checked');

      if (!selected) {
        alert("Selecione uma alternativa antes de responder.");
        return;
      }

      answered = true;

      const question = questions[currentQuestionIndex];
      const selectedAnswer = selected.value;
      const isCorrect = selectedAnswer === question.answer;

      tocarSom(isCorrect);

      const optionLabels = document.querySelectorAll(".option");

      optionLabels.forEach(label => {
        const letter = label.dataset.letter;
        const input = label.querySelector("input");

        input.disabled = true;

        if (letter === question.answer) {
          label.classList.add("correct");
        }

        if (letter === selectedAnswer && !isCorrect) {
          label.classList.add("wrong");
        }
      });

      if (isCorrect) {
        correctAnswers++;
      } else {
        wrongAnswers++;
      }

      userAnswers.push({
        questionNumber: currentQuestionIndex + 1,
        question: question.question,
        selected: selectedAnswer,
        correct: question.answer,
        explanation: question.explanation,
        isCorrect: isCorrect
      });

      document.getElementById("scoreCounter").textContent =
        `Acertos: ${correctAnswers} | Erros: ${wrongAnswers}`;

      const feedbackBox = document.getElementById("feedbackBox");

      if (isCorrect) {
        feedbackBox.className = "feedback show correct";
        feedbackBox.innerHTML = `
          <strong>Resposta correta.</strong>
          <div class="explanation">${question.explanation}</div>
        `;
      } else {
        feedbackBox.className = "feedback show wrong";
        feedbackBox.innerHTML = `
          <strong>Resposta errada.</strong> A alternativa correta é <strong>${question.answer.toUpperCase()}</strong>.
          <div class="explanation">${question.explanation}</div>
        `;
      }

      document.getElementById("checkButton").disabled = true;
      document.getElementById("nextButton").disabled = false;
    }

    function nextQuestion() {
      if (!answered) return;

      currentQuestionIndex++;

      if (currentQuestionIndex < questions.length) {
        loadQuestion();
      } else {
        showResult();
      }
    }

    function showResult() {
      document.getElementById("quizArea").classList.add("hidden");
      document.getElementById("resultScreen").classList.add("show");

      document.getElementById("progressBar").style.width = "100%";

      const percentage = Math.round((correctAnswers / questions.length) * 100);

      document.getElementById("finalScore").textContent =
        `Você acertou ${correctAnswers} de ${questions.length} questões. Aproveitamento: ${percentage}%.`;

      let message = "";

      if (percentage >= 85) {
        message = "Desempenho alto. Você domina bem porcentagem composta, variações sucessivas e problemas de concentração.";
      } else if (percentage >= 65) {
        message = "Desempenho bom. Os erros provavelmente estão nos problemas com variações sucessivas ou interpretação algébrica.";
      } else if (percentage >= 45) {
        message = "Desempenho intermediário. Vale revisar aumentos e descontos sucessivos, juros compostos e problemas de mistura.";
      } else {
        message = "Desempenho baixo. Recomenda-se revisar porcentagem básica antes de insistir nos problemas mais difíceis.";
      }

      document.getElementById("finalMessage").textContent = message;

      const reviewArea = document.getElementById("reviewArea");
      reviewArea.innerHTML = "<h2>Revisão das respostas</h2>";

      userAnswers.forEach(item => {
        const div = document.createElement("div");
        div.className = "review-item";

        div.innerHTML = `
          <strong>Questão ${item.questionNumber}</strong><br>
          ${item.isCorrect ? "Correta" : "Errada"}<br>
          Sua resposta: <strong>${item.selected.toUpperCase()}</strong><br>
          Resposta correta: <strong>${item.correct.toUpperCase()}</strong><br>
          <br>
          <strong>Explicação:</strong> ${item.explanation}
        `;

        reviewArea.appendChild(div);
      });
    }

    function restartQuiz() {
      currentQuestionIndex = 0;
      correctAnswers = 0;
      wrongAnswers = 0;
      answered = false;
      userAnswers = [];

      document.getElementById("quizArea").classList.remove("hidden");
      document.getElementById("resultScreen").classList.remove("show");
      document.getElementById("reviewArea").innerHTML = "";

      loadQuestion();
    }

    loadQuestion();
  </script>
</body>
</html>
