<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />

  <title>Quiz de Porcentagem</title>
  <style>
    
    function tocarSom(correta) {
  const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();

  osc.frequency.value = correta ? 880 : 220;
  osc.type = "sine";

  gain.gain.setValueAtTime(0.08, audioCtx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.2);

  osc.connect(gain);
  gain.connect(audioCtx.destination);

  osc.start();
  osc.stop(audioCtx.currentTime + 0.2);
}
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: #f3f5f8;
      color: #1f2933;
      line-height: 1.5;
    }

    header {
      background: #1f4f8f;
      color: white;
      padding: 28px 18px;
      text-align: center;
    }

    header h1 {
      margin: 0 0 8px;
      font-size: 2rem;
    }

    header p {
      margin: 0;
      font-size: 1rem;
      opacity: 0.95;
    }

    main {
      width: min(1100px, 94%);
      margin: 28px auto 48px;
    }

    .painel {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
      background: white;
      padding: 18px;
      border-radius: 14px;
      box-shadow: 0 8px 24px rgba(15, 23, 42, 0.08);
      margin-bottom: 22px;
      position: sticky;
      top: 0;
      z-index: 10;
    }

    .placar {
      font-weight: bold;
      color: #1f4f8f;
    }

    .botao-reset {
      border: none;
      background: #1f4f8f;
      color: white;
      padding: 10px 14px;
      border-radius: 10px;
      cursor: pointer;
      font-weight: bold;
    }

    .botao-reset:hover {
      background: #173b6c;
    }

    .grid-questoes {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 22px;
    }

    .questao {
      background: white;
      border-radius: 16px;
      padding: 22px;
      box-shadow: 0 8px 24px rgba(15, 23, 42, 0.08);
      border: 2px solid transparent;
    }

    .questao.respondida.correta {
      border-color: #22c55e;
    }

    .questao.respondida.errada {
      border-color: #ef4444;
    }

    .numero {
      font-weight: bold;
      color: #d61f69;
      font-size: 1.05rem;
      margin-bottom: 6px;
    }

    .enunciado {
      color: #243b67;
      font-weight: 600;
      margin: 0 0 16px;
    }

    .alternativas {
      display: grid;
      gap: 10px;
    }

    .alternativa {
      width: 100%;
      text-align: left;
      border: 1px solid #d8dee9;
      background: #f9fafb;
      padding: 12px 14px;
      border-radius: 10px;
      cursor: pointer;
      font-size: 0.98rem;
      transition: 0.15s ease;
    }

    .alternativa:hover:not(:disabled) {
      background: #eef4ff;
      border-color: #1f4f8f;
      transform: translateY(-1px);
    }

    .alternativa:disabled {
      cursor: not-allowed;
      opacity: 0.85;
    }

    .alternativa.escolhida-correta {
      background: #dcfce7;
      border-color: #22c55e;
      color: #166534;
      font-weight: bold;
    }

    .alternativa.escolhida-errada {
      background: #fee2e2;
      border-color: #ef4444;
      color: #991b1b;
      font-weight: bold;
    }

    .alternativa.resposta-correta {
      background: #dcfce7;
      border-color: #22c55e;
      color: #166534;
      font-weight: bold;
    }

    .feedback {
      margin-top: 14px;
      padding: 12px;
      border-radius: 10px;
      display: none;
      font-weight: bold;
    }

    .feedback.correto {
      display: block;
      background: #dcfce7;
      color: #166534;
    }

    .feedback.errado {
      display: block;
      background: #fee2e2;
      color: #991b1b;
    }

    .explicacao {
      margin-top: 8px;
      font-weight: normal;
      color: #374151;
    }

    footer {
      text-align: center;
      color: #6b7280;
      font-size: 0.9rem;
      margin-top: 28px;
    }

    @media (max-width: 800px) {
      .grid-questoes {
        grid-template-columns: 1fr;
      }

      .painel {
        align-items: flex-start;
        flex-direction: column;
        position: static;
      }
    }
  </style>
</head>

      quiz.innerHTML = "";
      questoes.forEach((questao, indiceQuestao) => {
        const artigo = document.createElement("article");
        artigo.className = "questao";
        artigo.dataset.questao = indiceQuestao;

        const numero = document.createElement("div");
        numero.className = "numero";
        numero.textContent = String(indiceQuestao + 1).padStart(2, "0") + ".";

        enunciado.className = "enunciado";
        enunciado.textContent = questao.enunciado;

        const alternativas = document.createElement("div");
        alternativas.className = "alternativas";

        questao.alternativas.forEach((textoAlternativa, indiceAlternativa) => {
          const botao = document.createElement("button");
          botao.type = "button";
          botao.className = "alternativa";
          botao.textContent = `${letraAlternativa(indiceAlternativa)} ${textoAlternativa}`;
          botao.addEventListener("click", () => responder(indiceQuestao, indiceAlternativa, artigo));
          alternativas.appendChild(botao);
        });

        const feedback = document.createElement("div");
        feedback.className = "feedback";
        feedback.setAttribute("aria-live", "polite");

        artigo.appendChild(numero);
        artigo.appendChild(enunciado);
        artigo.appendChild(alternativas);
        artigo.appendChild(feedback);
        quiz.appendChild(artigo);

      atualizarPainel();
    }

    function responder(indiceQuestao, indiceAlternativa, artigo) {
      if (artigo.classList.contains("respondida")) return;

      const questao = questoes[indiceQuestao];
      const botoes = artigo.querySelectorAll(".alternativa");
      const feedback = artigo.querySelector(".feedback");
      const acertou = indiceAlternativa === questao.correta;

      botoes.forEach((botao, indice) => {
        botao.disabled = true;

        if (indice === indiceAlternativa && acertou) {
          botao.classList.add("escolhida-correta");
        }

        if (indice === indiceAlternativa && !acertou) {
          botao.classList.add("escolhida-errada");
        }

        if (!acertou && indice === questao.correta) {
          botao.classList.add("resposta-correta");
        }
